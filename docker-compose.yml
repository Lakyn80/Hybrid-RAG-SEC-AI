services:

  redis:
    image: redis:7-alpine
    container_name: hybrid-rag-redis
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.16.3
    container_name: hybrid-rag-qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_HTTP_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  rag-api:
    build: .
    container_name: hybrid-rag-api
    depends_on:
      - redis
      - qdrant
    ports:
      - "${API_PORT:-8021}:8021"
    volumes:
      - .:/app
    environment:
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION_ALIAS: sec_filings_chunks_current
      QDRANT_TIMEOUT: ${QDRANT_TIMEOUT:-120}
      QDRANT_EMBED_BATCH_SIZE: ${QDRANT_EMBED_BATCH_SIZE:-16}
      QDRANT_UPSERT_RETRIES: ${QDRANT_UPSERT_RETRIES:-3}
      QDRANT_UPSERT_RETRY_DELAY: ${QDRANT_UPSERT_RETRY_DELAY:-5}
    restart: unless-stopped
    command: >
      gunicorn app.main:app
      -k uvicorn.workers.UvicornWorker
      -w ${API_WORKERS:-1}
      -t 300
      -b 0.0.0.0:8021
      --access-logfile -
      --access-logformat '%(h)s %(l)s %(u)s %(t)s \"%(r)s\" %(s)s %(b)s \"%(f)s\" \"%(a)s\"'

  rag-frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_BACKEND_URL: http://rag-api:8021
    container_name: hybrid-rag-frontend
    depends_on:
      - rag-api
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      NEXT_PUBLIC_BACKEND_URL: http://rag-api:8021
    restart: unless-stopped

volumes:
  qdrant_data:
