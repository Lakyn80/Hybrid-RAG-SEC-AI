name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  backend-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify FastAPI routes
        run: |
          python - <<'PY'
          from app.main import app

          paths = {route.path for route in app.routes}
          expected = {
              "/api/health",
              "/api/ask",
              "/api/stream",
              "/api/question-bank",
              "/api/cache/clear",
              "/docs",
          }
          missing = sorted(expected - paths)

          if missing:
              raise SystemExit(f"Missing routes: {missing}")

          print("Routes OK:", sorted(expected))
          PY

      - name: Compile backend and test runner
        run: |
          python -m compileall app tests/run_full_rag_eval.py

      - name: Run routing unit tests
        run: |
          python -m unittest tests.test_form_detection tests.test_query_routing

  frontend-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --no-audit --no-fund

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_BACKEND_URL: http://localhost:8021

  docker-build:
    runs-on: ubuntu-latest
    needs:
      - backend-checks
      - frontend-build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free disk space before Docker build
        run: |
          docker system prune -af || true
          docker builder prune -af || true
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android || true
          df -h

      - name: Build Docker images
        run: docker compose build rag-api rag-frontend
