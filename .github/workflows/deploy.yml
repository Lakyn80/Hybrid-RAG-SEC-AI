name: Deploy

on:
  workflow_dispatch:
    inputs:
      deploy_host:
        description: "Target server hostname or IP"
        required: true
        type: string
      deploy_user:
        description: "SSH user on target server"
        required: true
        type: string
      deploy_path:
        description: "Absolute path on the server where the repo should live"
        required: true
        type: string
      deploy_port:
        description: "SSH port"
        required: true
        default: "22"
        type: string
      ref:
        description: "Git ref to deploy"
        required: true
        default: "main"
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Prepare SSH key
        shell: bash
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${{ inputs.deploy_port }}" "${{ inputs.deploy_host }}" >> ~/.ssh/known_hosts

      - name: Ensure remote path exists
        shell: bash
        run: |
          ssh -p "${{ inputs.deploy_port }}" "${{ inputs.deploy_user }}@${{ inputs.deploy_host }}" \
            "mkdir -p '${{ inputs.deploy_path }}'"

      - name: Sync project to server
        shell: bash
        run: |
          rsync -az --delete \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '.next/' \
            --exclude 'frontend/.next/' \
            --exclude 'node_modules/' \
            --exclude 'frontend/node_modules/' \
            --exclude '__pycache__/' \
            --exclude '.pytest_cache/' \
            --exclude '.env' \
            --exclude 'data/cache/' \
            -e "ssh -p ${{ inputs.deploy_port }}" \
            ./ "${{ inputs.deploy_user }}@${{ inputs.deploy_host }}:${{ inputs.deploy_path }}/"

      - name: Deploy with Docker Compose
        shell: bash
        run: |
          ssh -p "${{ inputs.deploy_port }}" "${{ inputs.deploy_user }}@${{ inputs.deploy_host }}" <<'EOF'
          set -euo pipefail
          cd "${{ inputs.deploy_path }}"

          if [ ! -f .env ]; then
            echo "Missing .env on target server at $PWD/.env"
            exit 1
          fi

          docker compose up -d --build
          EOF
