name: Deploy

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-production
      cancel-in-progress: true

    steps:
      - name: Configure SSH
        shell: bash
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        shell: bash
        run: |
          ssh -o StrictHostKeyChecking=yes "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" 'bash -s' <<'EOF'
          set -euo pipefail

          DEPLOY_DIR="$HOME/projects/rag"
          REPO_URL="${{ github.server_url }}/${{ github.repository }}.git"
          GITHUB_TOKEN="${{ github.token }}"

          auth_header=
          if [ -n "$GITHUB_TOKEN" ]; then
            auth_header=$(printf '%s' "x-access-token:$GITHUB_TOKEN" | base64 | tr -d '\n')
          fi

          git_auth() {
            if [ -n "$auth_header" ]; then
              git -c "http.extraHeader=AUTHORIZATION: basic $auth_header" "$@"
            else
              git "$@"
            fi
          }

          mkdir -p "$(dirname "$DEPLOY_DIR")"

          if [ -d "$DEPLOY_DIR/.git" ]; then
            git_auth -C "$DEPLOY_DIR" fetch origin main
            git -C "$DEPLOY_DIR" checkout main
            git_auth -C "$DEPLOY_DIR" pull --ff-only origin main
          elif [ -d "$DEPLOY_DIR" ]; then
            BACKUP_DIR="${DEPLOY_DIR}_backup_$(date +%Y%m%d_%H%M%S)"
            PRESERVE_DIR="$(mktemp -d)"

            if [ -f "$DEPLOY_DIR/.env" ]; then
              cp "$DEPLOY_DIR/.env" "$PRESERVE_DIR/.env"
            fi

            if [ -f "$DEPLOY_DIR/docker-compose.override.yml" ]; then
              cp "$DEPLOY_DIR/docker-compose.override.yml" "$PRESERVE_DIR/docker-compose.override.yml"
            fi

            mv "$DEPLOY_DIR" "$BACKUP_DIR"
            git_auth clone --branch main --single-branch "$REPO_URL" "$DEPLOY_DIR"

            if [ -f "$PRESERVE_DIR/.env" ]; then
              mv "$PRESERVE_DIR/.env" "$DEPLOY_DIR/.env"
            fi

            if [ -f "$PRESERVE_DIR/docker-compose.override.yml" ]; then
              mv "$PRESERVE_DIR/docker-compose.override.yml" "$DEPLOY_DIR/docker-compose.override.yml"
            fi

            rmdir "$PRESERVE_DIR" 2>/dev/null || true
            echo "Backed up existing non-git deployment directory to: $BACKUP_DIR"
          else
            git_auth clone --branch main --single-branch "$REPO_URL" "$DEPLOY_DIR"
          fi

          cd "$DEPLOY_DIR"
          ENV_FILE="$DEPLOY_DIR/.env"
          COMPOSE_ENV_ARGS=()

          if [ -f "$ENV_FILE" ]; then
            set -a
            . "$ENV_FILE"
            set +a
            COMPOSE_ENV_ARGS=(--env-file "$ENV_FILE")
          fi

          if [ -z "${FRONTEND_PORT:-}" ]; then
            for port in 3000 3001 3002 3010; do
              if ! ss -ltn "( sport = :$port )" | awk 'NR>1 {print $4}' | grep -q .; then
                FRONTEND_PORT="$port"
                export FRONTEND_PORT
                break
              fi
            done
          fi

          if [ -z "${FRONTEND_PORT:-}" ]; then
            echo "Unable to determine a free frontend port." >&2
            exit 1
          fi

          get_service_image_id() {
            local service="$1"
            local container_id

            container_id=$(docker compose "${COMPOSE_ENV_ARGS[@]}" ps -q "$service" 2>/dev/null || true)
            if [ -n "$container_id" ]; then
              docker inspect -f '{{.Image}}' "$container_id" 2>/dev/null || true
            fi
          }

          remove_old_image_if_unused() {
            local image_id="$1"

            if [ -z "$image_id" ]; then
              return 0
            fi

            if docker ps -aq --filter "ancestor=$image_id" | grep -q .; then
              echo "Keeping image $image_id because it is still referenced by a container."
              return 0
            fi

            docker image rm -f "$image_id" || true
          }

          echo "Deploying with FRONTEND_PORT=$FRONTEND_PORT"
          if ! docker image inspect python-ai-base:1 >/dev/null 2>&1; then
            echo "Missing required local base image: python-ai-base:1" >&2
            exit 1
          fi

          OLD_API_IMAGE_ID="$(get_service_image_id rag-api)"
          OLD_FRONTEND_IMAGE_ID="$(get_service_image_id rag-frontend)"

          docker compose "${COMPOSE_ENV_ARGS[@]}" down --remove-orphans
          docker compose "${COMPOSE_ENV_ARGS[@]}" build rag-api rag-frontend
          docker compose "${COMPOSE_ENV_ARGS[@]}" up -d
          docker compose "${COMPOSE_ENV_ARGS[@]}" exec -T rag-api python app/scripts/bootstrap_qdrant.py
          remove_old_image_if_unused "$OLD_API_IMAGE_ID"
          remove_old_image_if_unused "$OLD_FRONTEND_IMAGE_ID"
          EOF
